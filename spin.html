<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin & Win - AnviPayz</title>
    <style>
        #anvi-splash {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: #0f172a;
            color: #ffffff;
            z-index: 9999;
            opacity: 1;
            pointer-events: none;
            animation: anviSplashOut 350ms ease forwards;
            animation-delay: 450ms;
        }

        #anvi-splash .inner {
            display: grid;
            gap: 12px;
            place-items: center;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            letter-spacing: 0.2px;
        }

        #anvi-splash .spinner {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-top-color: #ffffff;
            animation: anviSpin 800ms linear infinite;
        }

        html[data-theme="light"] #anvi-splash {
            background: #ffffff;
            color: #0f172a;
        }

        html[data-theme="light"] #anvi-splash .spinner {
            border-color: rgba(15, 23, 42, 0.2);
            border-top-color: #0f172a;
        }

        @keyframes anviSpin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes anviSplashOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            #anvi-splash {
                animation-duration: 1ms;
                animation-delay: 0ms;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260507-2">
    <script>
        (function () {
            const root = document.documentElement;
            const savedTheme = localStorage.getItem('anvi-theme') || root.getAttribute('data-theme') || 'dark';
            root.setAttribute('data-theme', savedTheme);
            root.classList.toggle('nav-collapsed-pref', localStorage.getItem('anvi-nav-collapsed') === '1');
        })();
    </script>
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <div id="anvi-splash" role="status" aria-live="polite" aria-label="Loading">
        <div class="inner">
            <div class="spinner" aria-hidden="true"></div>
            <div>Loading…</div>
        </div>
    </div>
    <div class="app-container">
        <div class="overlay"></div>
        <aside class="sidebar">
            <div class="brand"><i class="ri-wallet-3-fill"></i> AnviPayz</div>
            <nav class="nav-links">
                    <a href="home.html" class="nav-item"><i class="ri-home-5-line"></i> Dashboard</a>
                    <a href="wallet.html" class="nav-item"><i class="ri-wallet-line"></i> Wallet</a>
                    <a href="tasks.html" class="nav-item active"><i class="ri-task-line"></i> Tasks</a>
                    <a href="refer.html" class="nav-item"><i class="ri-share-forward-line"></i> Refer & Earn</a>
                    <a href="recharge.html" class="nav-item"><i class="ri-flashlight-fill"></i> Recharge <span
                            class="badge-soon">New</span></a>
<a href="notifications.html" class="nav-item"><i class="ri-notification-3-line"></i>
                        Notifications</a>
                    <a href="support.html" class="nav-item"><i class="ri-customer-service-2-line"></i> Support</a>
                </nav>
            <div class="nav-footer">
                <a href="index.html" class="nav-item" style="color: #ef4444;"><i class="ri-logout-box-r-line"></i>
                    Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="mobile-header">
                <a href="tasks.html" class="icon-btn"><i class="ri-arrow-left-line"></i></a>
                <div class="brand" style="margin:0; font-size:1.2rem;">Spin & Win</div>
                <div style="width: 32px;"></div>
            </div>

            <div style="text-align: center; margin-bottom: 20px;">
                <h1>Try Your Luck!</h1>
                <p style="color: var(--text-muted);">Spin the wheel daily to win coins.</p>
            </div>

            <div class="wheel-container">
                <div class="pointer"></div>
                <div class="wheel" id="wheel">
                </div>
                <div class="wheel-center"><i class="ri-vip-crown-fill" style="color:#f59e0b;"></i></div>
            </div>

            <div style="text-align: center;">
                <button id="btn-spin" class="spin-btn">SPIN NOW</button>
                <p id="spin-msg" style="margin-top: 15px; color: var(--text-muted); font-size: 0.9rem;">
                    Daily Limit: 1 Spin
                </p>
            </div>

            <div id="back-nav-container" style="margin-top: 1.5rem;"></div>

        </main>

        <nav class="mobile-nav">
            <a href="home.html" class="mobile-nav-item"><i
                    class="ri-home-5-line"></i><span>Home</span></a>
            <a href="wallet.html" class="mobile-nav-item"><i
                    class="ri-wallet-line"></i><span>Wallet</span></a>
            <a href="recharge.html" class="mobile-nav-item"><i
                    class="ri-flashlight-fill"></i><span>Recharge</span></a>
            <a href="tasks.html" class="mobile-nav-item"><i
                    class="ri-task-line"></i><span>Tasks</span></a>
            <a href="refer.html" class="mobile-nav-item active">
                <i class="ri-share-forward-line"></i>
                <span>Refer</span>
            </a>
        </nav>
    </div>

    <script src="config.js?v=20260528-1"></script>

    <script defer src="js/auth.js?v=20260525-2"></script>
</body>

</html>
