<!DOCTYPE html>
<html lang="en" data-theme="dark">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Shortcuts - AnviPayz</title>

        <style>
            #anvi-splash {
                position: fixed;
                inset: 0;
                display: grid;
                place-items: center;
                background: #0f172a;
                color: #ffffff;
                z-index: 9999;
                opacity: 1;
                pointer-events: none;
                animation: anviSplashOut 350ms ease forwards;
                animation-delay: 1200ms;
            }

            #anvi-splash .inner {
                display: grid;
                gap: 12px;
                place-items: center;
                font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
                letter-spacing: 0.2px;
            }

            #anvi-splash .spinner {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                border: 3px solid rgba(255, 255, 255, 0.25);
                border-top-color: #ffffff;
                animation: anviSpin 800ms linear infinite;
            }

            html[data-theme="light"] #anvi-splash {
                background: #ffffff;
                color: #0f172a;
            }

            html[data-theme="light"] #anvi-splash .spinner {
                border-color: rgba(15, 23, 42, 0.2);
                border-top-color: #0f172a;
            }

            @keyframes anviSpin {
                to {
                    transform: rotate(360deg);
                }
            }

            @keyframes anviSplashOut {
                to {
                    opacity: 0;
                    visibility: hidden;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                #anvi-splash {
                    animation-duration: 1ms;
                    animation-delay: 0ms;
                }
            }
        </style>

        <script>
        (function () {
            const root = document.documentElement;
            const savedTheme = localStorage.getItem('anvi-theme') || root.getAttribute('data-theme') || 'dark';
            root.setAttribute('data-theme', savedTheme);
            root.classList.toggle('nav-collapsed-pref', localStorage.getItem('anvi-nav-collapsed') === '1');
        })();
    </script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
            rel="stylesheet">
        <link
            href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
            rel="stylesheet">

        <link rel="shortcut icon" href="favicon.png" type="image/png">
        <link rel="stylesheet" href="css/style.css?v=20260507-2">
    </head>

            <main class="main-content page-main">

                <div class="mobile-header compact-mobile-header">

                    <div class="brand app-shell-title">Shortcuts</div>

                        <h1>Shortcuts</h1>
                        <p class="page-subtitle">Choose what shows on the Home quick actions.</p>
                    </div>
                    <div class="topbar-actions">
                        <div id="header-token-badge"

                    </div>
                </header>

                <section class="card shortcuts-card">
                    <div class="shortcuts-toolbar">
                        <div class="shortcuts-toolbar__copy">
                            <div class="shortcuts-title">Pinned on Home</div>
                            <div class="shortcuts-sub">Pick up to 8 items. Order = left to right.</div>
                        </div>
                        <div class="shortcuts-toolbar__actions">
                            <button type="button" class="btn-primary--ghost btn-inline shortcuts-edit-btn" id="shortcuts-edit-btn"

                                <i class="ri-edit-2-line"></i>
                                <span class="shortcuts-edit-label">Edit</span>
                            </button>
                            <button type="button" class="btn-primary btn-inline" id="shortcuts-save-btn" hidden>
                                <i class="ri-save-3-line"></i> Save
                            </button>
                        </div>
                    </div>

                    <div id="shortcuts-list" class="shortcuts-grid">
                        <div class="loading-block">
                            <div class="spinner"></div>
                            Loading shortcuts...
                        </div>
                    </div>
                </section>

            </main>

            <nav class="mobile-nav">
